<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>All Books</title>
    <link rel="stylesheet" th:href="@{/style.css}"/>
</head>
<body>
<div class="container">
    <h2>All Books</h2>
    <a href="/books/add" class="btn btn-success btn-large">➕ Add New Book</a>

    <div class="table-container">
        <table class="data-table">
            <thead>
            <tr>
                <th>ID</th>
                <th>Title</th>
                <th>Author</th>
                <th>Price</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="book : ${books}">
                <td th:text="${book.id}"></td>
                <td th:text="${book.title}"></td>
                <td th:text="${book.author}"></td>
                <td>$<span th:text="${book.price}"></span></td>
                <td style="white-space: nowrap; gap: 5px; display: flex; align-items: center;">

                    <!-- Delete Form (small button) -->
                <td style="white-space: nowrap; gap: 5px; display: flex; align-items: center;">
                    <!-- View BUTTON (styled like Delete) -->
                    <form style="display: inline; margin: 0; padding: 0;">
                        <button type="button"
                                class="btn btn-info btn-small"
                                style="padding: 4px 12px; font-size: 12px; margin: 0; border: none;"
                                th:onclick="'window.location.href=\'' + @{/books/{id}(id=${book.id})} + '\''">View</button>
                    </form>

                    <!-- Delete BUTTON -->
                    <form th:action="@{/books/delete/{id}(id=${book.id})}" method="post"
                          style="display: inline; margin: 0; padding: 0;">
                        <button type="submit"
                                class="btn btn-danger btn-small"
                                style="padding: 4px 12px; font-size: 12px; margin: 0; border: none;"
                                onclick="return confirm('Delete this book?')">Delete</button>
                    </form>
                </td>

                </td>

            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
