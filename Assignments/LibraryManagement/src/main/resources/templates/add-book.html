<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add New Book</title>
    <link rel="stylesheet" th:href="@{/style.css}"/>
</head>
<body>
<div class="container">
    <h2>➕ Add New Book</h2>
    <form th:action="@{/books/add}" th:object="${book}" method="post">

        <div class="form-group">
            <label for="id">🆔 Book ID:</label>
            <input type="number" id="id" th:field="*{id}" required
                   min="1" placeholder="Enter unique ID"/>
            <span th:if="${#fields.hasErrors('id')}" th:errors="*{id}" class="error"></span>
        </div>

        <div class="form-group">
            <label for="title">📖 Book Title:</label>
            <input type="text" id="title" th:field="*{title}" required
                   placeholder="Enter book title"/>
            <span th:if="${#fields.hasErrors('title')}" th:errors="*{title}" class="error"></span>
        </div>

        <div class="form-group">
            <label for="author">✍️ Author:</label>
            <input type="text" id="author" th:field="*{author}" required
                   placeholder="Enter author name"/>
            <span th:if="${#fields.hasErrors('author')}" th:errors="*{author}" class="error"></span>
        </div>

        <div class="form-group">
            <label for="price">💰 Price ($):</label>
            <input type="number" id="price" step="0.01" th:field="*{price}"
                   min="0.01" max="999.99" required
                   placeholder="0.00"/>
            <span th:if="${#fields.hasErrors('price')}" th:errors="*{price}" class="error"></span>
        </div>

        <div class="nav-buttons">
            <button type="submit" class="btn btn-success btn-large">✅ Add Book</button>
            <a href="/books" class="btn btn-secondary btn-large">← Back to Books</a>
        </div>
    </form>
</div>
</body>
</html>
