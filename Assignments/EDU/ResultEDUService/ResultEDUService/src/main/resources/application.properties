spring.application.name=ResultEDUService
server.port=8020


eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

spring.datasource.url=jdbc:mysql://localhost:3306/appointment_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=Murali#13
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect


resilience4j.circuitbreaker.instances.attendanceService.register-health-indicator=true
resilience4j.circuitbreaker.instances.attendanceService.sliding-window-size=10
resilience4j.circuitbreaker.instances.attendanceService.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.attendanceService.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.attendanceService.automatic-transition-from-open-to-half-open-enabled=true
resilience4j.circuitbreaker.instances.attendanceService.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.attendanceService.failure-rate-threshold=50

resilience4j.circuitbreaker.instances.studentService.register-health-indicator=true
resilience4j.circuitbreaker.instances.studentService.sliding-window-size=10
resilience4j.circuitbreaker.instances.studentService.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.studentService.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.studentService.failure-rate-threshold=50

resilience4j.timelimiter.instances.attendanceService.timeout-duration=3s
resilience4j.timelimiter.instances.studentService.timeout-duration=3s

feign.circuitbreaker.enabled=true

management.endpoints.web.exposure.include=*
management.health.circuitbreakers.enabled=true
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=${ZIPKIN_URL:http://localhost:9411/api/v2/spans}
